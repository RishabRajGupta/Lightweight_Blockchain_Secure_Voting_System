{% extends "base.html" %}
{% block content %}
<section class="auth-card">
    <div class="auth-visual">
        <div class="chain-radar">
            <i data-lucide="fingerprint"></i>
        </div>
        <span class="security-tag"><i data-lucide="key-round"></i> ECDSA signed ballots</span>
        <span class="security-tag secondary"><i data-lucide="blocks"></i> Validator consensus</span>
    </div>
    <div class="auth-copy">
        <p class="eyebrow">Research prototype</p>
        <h1>SecureVote Chain</h1>
        <p>Lightweight blockchain voting with signed transactions, Merkle verification, and tamper-aware audit trails.</p>
    </div>
    <form method="post" class="auth-form" data-validate-form>
        <label class="field-label" for="voter_id">Voter ID</label>
        <div class="input-shell">
            <i data-lucide="badge-check"></i>
            <input id="voter_id" name="voter_id" placeholder="VOTER001" required>
        </div>
        <label class="field-label" for="password">Password</label>
        <div class="input-shell">
            <i data-lucide="lock-keyhole"></i>
            <input id="password" type="password" name="password" placeholder="password123" required>
        </div>
        <button class="btn-premium w-100" type="submit"><i data-lucide="log-in"></i> Authenticate Voter</button>
    </form>
    <div class="auth-footer">
        <span>Sample: VOTER001 / password123</span>
        <a href="{{ url_for('admin_login') }}">Admin portal</a>
    </div>
</section>
{% endblock %}
